<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KAeRU Log</title>
<link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="96x96" href="/images/favicon-96x96.png">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="chat-app">
  <header class="chat-header">
    <div class="app-brand">
      <img class="logo" src="/images/logo.png" alt="KAeRU Log" />
      <div class="app-title">KAeRU Log</div>
    </div>

    <div class="connection-status" aria-live="polite">
      <div id="connectionIndicator" class="status-indicator" aria-hidden="true"></div>
      <div id="connectionText">接続中...</div>
      <div id="onlineUserCount"></div>
    </div>

    <div class="header-actions">
      <button id="openProfileButton" class="btn" type="button">プロフィール</button>
      <button id="openAdminButton" class="btn danger" type="button">管理</button>
    </div>
  </header>

  <div id="toastNotification" class="toast-notification" role="status" aria-live="polite"></div>

  <main id="chatMain">
    <div id="messageList" class="message-list" aria-live="polite" aria-relevant="additions"></div>
  </main>

  <div class="room-selector">
    <input type="text" id="roomIdInput" placeholder="ルームIDを入力" maxlength="32" autocomplete="off" inputmode="latin" />
    <button id="joinRoomButton" class="btn accent" type="button">入室</button>
  </div>

  <footer class="message-composer">
    <div class="composer-row">
      <div class="message-input-wrapper">
        <textarea id="messageTextarea" placeholder="メッセージを入力" maxlength="300" rows="2"></textarea>
      </div>
      <div class="send-area">
        <button id="sendMessageButton" class="btn accent" type="button">送信</button>
      </div>
    </div>
  </footer>
</div>

<div id="profileModal" class="modal-overlay" aria-hidden="true">
  <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="profileModalTitle">
    <h3 id="profileModalTitle">プロフィール</h3>
    <div class="form-field">
      <label for="profileNameInput">ユーザー名（1〜20文字）</label>
      <input id="profileNameInput" type="text" maxlength="20" placeholder="例: たろう" autocomplete="nickname">
    </div>
    <div class="modal-actions">
      <button id="saveProfileButton" class="btn accent" type="button">保存</button>
      <button id="closeProfileButton" class="btn" type="button">閉じる</button>
    </div>
  </div>
</div>

<div id="adminModal" class="modal-overlay" aria-hidden="true">
  <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="adminModalTitle">
    <h3 id="adminModalTitle">管理パネル</h3>

    <div id="adminLoginSection" class="form-field">
      <label for="adminPasswordInput">パスワード</label>
      <input id="adminPasswordInput" type="password" placeholder="パスワードを入力" autocomplete="current-password">
      <div class="modal-actions">
        <button id="adminLoginButton" class="btn accent" type="button">ログイン</button>
        <button id="closeAdminButton" class="btn" type="button">閉じる</button>
      </div>
    </div>

    <div id="adminPanelSection" class="form-field hidden">
      <div class="modal-actions">
        <button id="clearMessagesButton" class="btn danger" type="button">全メッセージ削除</button>
        <button id="adminLogoutButton" class="btn" type="button">ログアウト</button>
        <button id="closeAdminButton2" class="btn" type="button">閉じる</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script type="module" src="/js/index.js"></script>
</body>
</html>
